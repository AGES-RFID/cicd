name: "Setup Bun"
description: "Instala o Bun, configura cache e instala dependências."

inputs:
  working-directory:
    required: true

runs:
  using: "composite"
  steps:
    - name: Install Bun
      uses: oven-sh/setup-bun@v1

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bun install --frozen-lockfile
