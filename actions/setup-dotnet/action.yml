name: "Validate PR"
description: "Garante conformidade com nomenclaturas de Trunk-Based e Conventional Commits."

inputs:
  github-token:
    description: "Token para leitura de PRs"
    required: true

runs:
  using: "composite"
  steps:
    - name: Check branch name
      if: github.event_name == 'pull_request'
      shell: bash
      run: |
        if [[ ! "${{ github.head_ref }}" =~ ^(feat|fix|chore|docs|refactor)\/[0-9]+-[a-z0-9-]+$ ]]; then
          echo "[ERROR] Invalid branch name: ${{ github.head_ref }}"
          echo "[INFO] Expected format: <type>/<id>-<kebab-case-description>"
          exit 1
        fi

    - name: Check PR title
      if: github.event_name == 'pull_request'
      uses: amannn/action-semantic-pull-request@v5
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
