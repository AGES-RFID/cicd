name: GitLab Sync

on:
  workflow_call:
    inputs:
      gitlab_repo_name:
        description: "Nome do repositório no GitLab. Se omitido, infere automaticamente do GitHub."
        type: string
        required: false
        default: ""
    secrets:
      gitlab_token:
        required: true

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    timeout-minutes: 2
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Limites de Timeout do Git
        run: |
          git config --global http.lowSpeedLimit 1000
          git config --global http.lowSpeedTime 10

      - name: Sync to GitLab
        id: gitlab_push
        run: |
          REPO_NAME="${{ inputs.gitlab_repo_name != '' && inputs.gitlab_repo_name || github.event.repository.name }}"

          AUTH_URL="https://oauth2:${{ secrets.gitlab_token }}@${{ vars.GITLAB_DOMAIN }}/${{ vars.GITLAB_GROUP_PATH }}/${REPO_NAME}.git"

          echo "[INFO] Preparando sync dos repositórios..."
          echo "[INFO] Origem: GitHub (${{ github.event.repository.name }})"
          echo "[INFO] Destino: GitLab (${{ vars.GITLAB_DOMAIN }}/${{ vars.GITLAB_GROUP_PATH }}/${REPO_NAME}.git)"

          git remote add gitlab "$AUTH_URL"

          git fetch origin '+refs/heads/*:refs/heads/*' --update-head-ok

          echo "[INFO] Enviando alterações para o repositório no GitLab..."

          if git push gitlab "refs/heads/*:refs/heads/*" --force && git push gitlab --tags --force; then
            echo "[SUCCESS] Sincronização com GitLab concluída com sucesso."
          else
            echo "sync_failed=true" >> $GITHUB_OUTPUT
            echo "::warning title=GitLab Sync Failure::A sincronização com o servidor da AGES (tools.ages.pucrs.br) falhou por timeout (Error 524) ou indisponibilidade. O deploy principal continuará normalmente."
          fi

      - name: Fallback Notification (Opcional)
        if: steps.gitlab_push.outputs.sync_failed == 'true'
        run: echo "[WARN] Job de Sincronização falhou graciosamente. Verifique a estabilidade do servidor destino."
