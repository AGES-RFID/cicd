name: Reusable Sync to GitLab

on:
  workflow_call:
    secrets:
      gitlab_token:
        required: true

env:
  GITLAB_BASE_PATH: "sistema-de-controle-inteligente-de-estacionamento-com-rfid"
  GITLAB_DOMAIN: "tools.ages.pucrs.br"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Mirror to GitLab
        run: |
          GITLAB_REPO_NAME="${{ github.event.repository.name }}"
          AUTH_URL="https://oauth2:${{ secrets.gitlab_token }}@${{ env.GITLAB_DOMAIN }}/${{ env.GITLAB_BASE_PATH }}/${GITLAB_REPO_NAME}.git"
          
          echo "[INFO] Sincronizando: ${GITLAB_REPO_NAME} para o GitLab da AGES..."
          
          git remote add gitlab "$AUTH_URL"
          git push gitlab --mirror