name: Continuous Deployment - Lambda

on:
  workflow_call:
    inputs:
      environment:
        description: 'Ambiente de destino (staging, production)'
        required: true
        type: string
      version:
        description: 'Versão a ser implantada (Tag)'
        required: true
        type: string
      role-to-assume:
        description: 'ARN da Role OIDC na AWS'
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to AWS Lambda (.zip)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - name: Log Start
        run: |
          echo "[INFO] Iniciando implantação para: ${{ inputs.environment }}"
          echo "[INFO] Promovendo versão: ${{ inputs.version }}"
          
      - name: Checkout Backend Code
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          
      - name: Publish Backend
        run: |
          dotnet publish Backend.API/Backend.API.csproj \
            -c Release \
            -o ./publish \
            -r linux-x64 \
            --self-contained false
            
      - name: Create Zip Package
        working-directory: ./publish
        run: zip -r ../deploy_package.zip .
        
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: us-east-2
          
      - name: Update Lambda Function Code
        run: |
          echo "[INFO] Updating Lambda Function: ${{ vars.LAMBDA_FUNCTION_NAME }}"
          aws lambda update-function-code \
            --function-name ${{ vars.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://deploy_package.zip
