name: Continuous Deployment - S3 & CloudFront

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      version:
        required: true
        type: string
      role-to-assume:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Provision & Deploy Frontend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Checkout Infrastructure Code
        uses: actions/checkout@v4
        with:
          repository: AGES-RFID/cicd
          path: cicd-repo

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-to-assume }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Apply (Frontend)
        working-directory: cicd-repo/terraform
        run: |
          terraform init
          terraform apply -target=aws_s3_bucket.frontend -target=aws_cloudfront_distribution.frontend_cdn -var-file=${{ inputs.environment }}.tfvars -auto-approve


          TF_BUCKET=$(terraform output -raw frontend_bucket_name)
          echo "TARGET_BUCKET=$TF_BUCKET" >> $GITHUB_ENV

      - name: Push Dist Folder to S3
        run: |
          echo "[INFO] Sincronizando código com o bucket: ${{ env.TARGET_BUCKET }}"
          aws s3 sync dist/ s3://${{ env.TARGET_BUCKET }}/frontend/ --delete --exclude "*.map"
          echo "[SUCCESS] Deploy Frontend concluído."
