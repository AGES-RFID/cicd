name: Continuous Integration - .NET

on:
  workflow_call:
    inputs:
      dotnet-version:
        type: string
        default: "10.0.x"
      working-directory:
        type: string
        default: "."
    secrets:
      GH_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true

jobs:
  pr-validation:
    name: Validate PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: AGES-RFID/cicd/.github/actions/validate-pr@main
        with:
          github-token: ${{ secrets.GH_TOKEN }}

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: '**/*.csproj'
      - name: Restore dependencies
        run: dotnet restore
      - name: Verify formatting
        run: |
          echo "[INFO] Executando validação de formatação (.editorconfig)."
          dotnet format --verify-no-changes
          echo "[SUCCESS] Validação de formatação concluída com sucesso."

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: '**/*.csproj'
      - name: Restore dependencies
        run: dotnet restore
      - name: Run unit tests
        run: |
          echo "[INFO] Executando testes unitários."
          dotnet test Backend.Tests.Unit/ --no-restore --collect:"XPlat Code Coverage;Format=opencover"
          echo "[SUCCESS] Testes unitários executados com sucesso."
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: '**/coverage.opencover.xml'
          include-hidden-files: true

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: '**/*.csproj'
      - name: Restore dependencies
        run: dotnet restore
      - name: Run integration tests
        run: |
          echo "[INFO] Executando testes de integração."
          dotnet test Backend.Tests.Integration/ --no-restore --collect:"XPlat Code Coverage;Format=opencover"
          echo "[SUCCESS] Testes de integração executados com sucesso."
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: '**/coverage.opencover.xml'
          include-hidden-files: true

  build:
    name: Build
    needs: [test-unit, test-integration]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: '**/*.csproj'
      - name: Restore dependencies
        run: dotnet restore
      - name: Build release artifact
        run: |
          echo "[INFO] Compilando artefato de release."
          dotnet build --configuration Release --no-restore
          echo "[SUCCESS] Build executado com sucesso."

  sast:
    name: Static Analysis
    needs: [test-unit, test-integration]
    uses: AGES-RFID/cicd/.github/workflows/sonar-scan.yml@ci/7-sonar-integration
    with:
      project-type: 'dotnet'
      project-key: 'AGES-RFID_backend'
      dotnet-version: ${{ inputs.dotnet-version }}
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
