name: Continuous Integration - .NET

on:
  workflow_call:
    inputs:
      dotnet-version:
        type: string
        default: "10.0.x"
      working-directory:
        type: string
        default: "."
    secrets:
      GH_TOKEN:
        required: true

jobs:
  pr-validation:
    name: Validate PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: AGES-RFID/cicd/.github/actions/validate-pr@main
        with:
          github-token: ${{ secrets.GH_TOKEN }}

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'
          
      - name: Restore dependencies
        run: dotnet restore

      - name: Verify formatting
        run: |
          echo "[INFO] Executando validação de formatação (.editorconfig)."
          dotnet format --verify-no-changes
          echo "[SUCCESS] Validação de formatação concluída com sucesso."

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'
          
      - name: Restore dependencies
        run: dotnet restore

      - name: Run unit tests
        run: |
          echo "[INFO] Executando testes unitários."
          dotnet test Backend.Tests.Unit/ --no-restore
          echo "[SUCCESS] Testes unitários executados com sucesso."

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'
          
      - name: Restore dependencies
        run: dotnet restore

      - name: Run integration tests
        run: |
          echo "[INFO] Executando testes de integração."
          dotnet test Backend.Tests.Integration/ --no-restore
          echo "[SUCCESS] Testes de integração executados com sucesso."

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          cache: true
          cache-dependency-path: '**/packages.lock.json'
          
      - name: Restore dependencies
        run: dotnet restore

      - name: Build release artifact
        run: |
          echo "[INFO] Compilando artefato de release."
          dotnet build --configuration Release --no-restore
          echo "[SUCCESS] Build executado com sucesso."
