name: Continuous Deployment

on:
  workflow_call:
    inputs:
      environment:
        description: 'Ambiente de destino (staging, production)'
        required: true
        type: string
      version:
        description: 'Versão a ser implantada (Tag)'
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to AWS Lambda (.zip)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Validate Environment
        run: |
          if [[ "${{ inputs.environment }}" != "staging" && "${{ inputs.environment }}" != "production" ]]; then
            echo "[ERROR] Ambiente inválido: ${{ inputs.environment }}. Use 'staging' ou 'production'."
            exit 1
          fi
      - name: Log Start
        run: |
          echo "[INFO] Iniciando implantação para: ${{ inputs.environment }}"
          echo "[INFO] Promovendo versão: ${{ inputs.version }}"
      - name: Checkout Backend Code
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish Backend
        run: |
          dotnet publish Backend.API/Backend.API.csproj \
            -c Release \
            -o ./publish \
            -r linux-x64 \
            --self-contained false
      - name: Create Zip Package
        working-directory: ./publish
        run: zip -r ../deploy_package.zip .
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4 #
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Update Lambda Function Code
        run: |
          aws lambda update-function-code \
            --function-name ${{ secrets.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://deploy_package.zip

      - name: Log Success
        run: echo "[SUCCESS] Processo de implantação para ${{ inputs.environment }} concluído."
