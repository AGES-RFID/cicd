name: Continuous Integration - Bun

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
      environment:
        type: string
        required: true
    secrets:
      GH_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pr-validation:
    name: Validate PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: AGES-RFID/cicd/.github/actions/validate-pr@main
        with:
          github-token: ${{ secrets.GH_TOKEN }}

  quality-gate:
    name: Lint, Test & SAST
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run Lint
        run: bun run check
      - name: Run Unit Tests
        run: bun run test:cov

  build:
    name: Build Environment Artifact
    needs: [quality-gate]
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build frontend
        run: bun run build
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ inputs.environment }}
          path: ${{ inputs.working-directory }}/dist/
          retention-days: 7
