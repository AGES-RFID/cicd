name: CI Bun

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
    secrets:
      GH_TOKEN:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pr-validation:
    name: Validate PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: AGES-RFID/cicd/.github/actions/validate-pr@main
        with:
          github-token: ${{ secrets.GH_TOKEN }}

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: AGES-RFID/cicd/.github/actions/setup-bun@main
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Verify code quality
        working-directory: ${{ inputs.working-directory }}
        run: bun run check

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: AGES-RFID/cicd/.github/actions/setup-bun@main
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Run unit tests
        working-directory: ${{ inputs.working-directory }}
        run: bun run test:cov

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: AGES-RFID/cicd/.github/actions/setup-bun@main
        with:
          working-directory: ${{ inputs.working-directory }}

      - name: Build production artifact
        working-directory: ${{ inputs.working-directory }}
        run: bun run build
