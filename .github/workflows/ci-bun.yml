name: Continuous Integration - Bun

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
    secrets:
      GH_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  pr-validation:
    name: Validate PR
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: AGES-RFID/cicd/.github/actions/validate-pr@main
        with:
          github-token: ${{ secrets.GH_TOKEN }}

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify code quality
        run: |
          echo "[INFO] Executando análise estática de código (lint/format)."
          bun run check
          echo "[SUCCESS] Análise estática concluída com sucesso."

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run unit tests
        run: |
          echo "[INFO] Executando testes unitários e gerando relatório de cobertura."
          bun run test:cov
          echo "[SUCCESS] Testes unitários executados com sucesso."
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-bun
          path: coverage/lcov.info
          include-hidden-files: true

  build:
    name: Build
    needs: [test-unit]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build production artifact
        run: |
          echo "[INFO] Compilando artefato de produção."
          bun run build
          echo "[SUCCESS] Build executado com sucesso."

  sast:
    name: Static Analysis
    needs: [test-unit]
    uses: AGES-RFID/cicd/.github/workflows/sonar-scan.yml@ci/7-sonar-integration
    with:
      project-type: 'bun'
      project-key: 'AGES-RFID_frontend'
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
