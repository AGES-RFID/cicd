name: Deployment S3

on:
  workflow_call:
    inputs:
      environment:
        description: "Ambiente de destino (staging, production)"
        required: true
        type: string
      version:
        description: "Versão a ser implantada (Tag)"
        required: true
        type: string

jobs:
  deploy:
    name: Deploy to AWS S3
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Validate Environment
        run: |
          if [[ "${{ inputs.environment }}" != "staging" && "${{ inputs.environment }}" != "production" ]]; then
            echo "[ERROR] Ambiente inválido: ${{ inputs.environment }}. Use 'staging' ou 'production'."
            exit 1
          fi

      - name: Log Start
        run: |
          echo "[INFO] Iniciando implantação para: ${{ inputs.environment }}"
          echo "[INFO] Promovendo versão: ${{ inputs.version }}"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Push dist folder to S3
        run: |
          echo "[INFO] Pushing dist folder to S3 bucket: ${{ secrets.S3_BUCKET_NAME }}"
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }}/frontend/ \
            --delete \
            --exclude "*.map"
          echo "[SUCCESS] dist folder synced to S3."

      - name: Log Success
        run: echo "[SUCCESS] Processo de implantação para ${{ inputs.environment }} concluído."
